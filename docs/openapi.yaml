openapi: 3.1.0
info:
  title: gxp-idProvider API
  version: 0.3.0
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://idp.gxp.internal
security: []

tags:
  - name: health
    description: Health and readiness probes.
  - name: auth-public
    description: Public authentication endpoints.
  - name: auth-protected
    description: Bearer-token protected user endpoints.
  - name: oauth
    description: OAuth 2.0 token lifecycle endpoints.
  - name: oidc
    description: OpenID Connect discovery and key endpoints.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
    basicAuth:
      type: http
      scheme: basic

  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        traceId:
          type: string

    EmptyObject:
      type: object
      additionalProperties: true

    HealthResponse:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    ReadyResponse:
      type: object
      additionalProperties: false
      required: [ready]
      properties:
        ready:
          type: boolean
          enum: [true]

    SignupRequest:
      type: object
      additionalProperties: false
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
          maxLength: 128
        displayName:
          type: string
          minLength: 1
          maxLength: 80

    SignupResponseProduction:
      type: object
      additionalProperties: false
      required: [status, user, verification]
      properties:
        status:
          type: string
          enum: [accepted]
        user:
          type: object
          additionalProperties: false
          required: [userId, email]
          properties:
            userId:
              type: string
              format: uuid
            email:
              type: string
              format: email
        verification:
          type: object
          additionalProperties: false
          required: [required]
          properties:
            required:
              type: boolean
              enum: [true]

    SignupResponseNonProduction:
      type: object
      additionalProperties: false
      required: [status, user, verification]
      properties:
        status:
          type: string
          enum: [accepted]
        user:
          type: object
          additionalProperties: false
          required: [userId, email]
          properties:
            userId:
              type: string
              format: uuid
            email:
              type: string
              format: email
        verification:
          type: object
          additionalProperties: false
          required: [required, token]
          properties:
            required:
              type: boolean
              enum: [true]
            token:
              type: string

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
          maxLength: 128
        mfaCode:
          type: string
          pattern: '^\d{6}$'
        mfaFactorId:
          type: string
          format: uuid
        mfaRecoveryCode:
          type: string
          minLength: 20
          maxLength: 32

    GoogleLoginRequest:
      type: object
      additionalProperties: false
      required: [idToken]
      properties:
        idToken:
          type: string
          minLength: 1
        mfaCode:
          type: string
          pattern: '^\d{6}$'
        mfaFactorId:
          type: string
          format: uuid
        mfaRecoveryCode:
          type: string
          minLength: 20
          maxLength: 32

    LoginResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - userId
        - mfaEnabled
        - accessToken
        - refreshToken
        - accessExpiresAt
        - refreshExpiresAt
      properties:
        status:
          type: string
          enum: [ok]
        userId:
          type: string
          format: uuid
        mfaEnabled:
          type: boolean
        mfaWarning:
          type: [string, 'null']
        accessToken:
          type: string
        refreshToken:
          type: string
        accessExpiresAt:
          type: string
          format: date-time
        refreshExpiresAt:
          type: string
          format: date-time

    MfaRequiredResponse:
      type: object
      additionalProperties: false
      required: [mfaRequired, userId]
      properties:
        mfaRequired:
          type: boolean
          enum: [true]
        userId:
          type: string
          format: uuid

    RefreshRequest:
      type: object
      additionalProperties: false
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 16
          maxLength: 1024

    TokenRefreshResponse:
      type: object
      additionalProperties: false
      required: [userId, accessToken, refreshToken, accessExpiresAt, refreshExpiresAt]
      properties:
        userId:
          type: string
          format: uuid
        accessToken:
          type: string
        refreshToken:
          type: string
        accessExpiresAt:
          type: string
          format: date-time
        refreshExpiresAt:
          type: string
          format: date-time

    OAuthTokenResponse:
      type: object
      additionalProperties: false
      required: [token_type, access_token, refresh_token, expires_in]
      properties:
        token_type:
          type: string
          enum: [Bearer]
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          minimum: 1

    EmailVerifyRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email

    EmailVerifyRequestResponseProduction:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted]

    EmailVerifyRequestResponseNonProduction:
      type: object
      additionalProperties: false
      required: [status, token]
      properties:
        status:
          type: string
          enum: [accepted]
        token:
          type: [string, 'null']

    EmailVerifyConfirmRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          minLength: 16
          maxLength: 1024

    StatusOkResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    LoggedOutResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [logged_out]

    VerifiedResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [verified]

    ResetResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [reset]

    ChangedResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [changed]

    PasswordResetRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetRequestResponse:
      type: object
      additionalProperties: false
      required: [status, accepted]
      properties:
        status:
          type: string
          enum: [accepted]
        accepted:
          type: boolean
          enum: [true]
        token:
          type: string

    PasswordResetConfirmRequest:
      type: object
      additionalProperties: false
      required: [resetToken, newPassword]
      properties:
        resetToken:
          type: string
          minLength: 16
          maxLength: 1024
        newPassword:
          type: string
          minLength: 12
          maxLength: 128

    MeResponse:
      type: object
      additionalProperties: false
      required: [userId, email, status, emailVerified, profile]
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        status:
          type: string
        emailVerified:
          type: boolean
        profile:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      additionalProperties: false
      required: [displayName, givenName, familyName, preferredUsername, locale, zoneinfo]
      properties:
        displayName:
          type: [string, 'null']
          maxLength: 80
        givenName:
          type: [string, 'null']
          maxLength: 80
        familyName:
          type: [string, 'null']
          maxLength: 80
        preferredUsername:
          type: [string, 'null']
          pattern: '^(?!.*[._-]{2})(?!.*[._-]$)[a-z0-9][a-z0-9._-]{2,63}$'
        locale:
          type: [string, 'null']
          maxLength: 35
        zoneinfo:
          type: [string, 'null']
          maxLength: 64

    UpdateMeRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 80
        givenName:
          type: string
          minLength: 1
          maxLength: 80
        familyName:
          type: string
          minLength: 1
          maxLength: 80
        preferredUsername:
          type: string
          pattern: '^(?!.*[._-]{2})(?!.*[._-]$)[a-z0-9][a-z0-9._-]{2,63}$'
        locale:
          type: string
          minLength: 1
          maxLength: 35
        zoneinfo:
          type: string
          minLength: 1
          maxLength: 64

    MfaEnrollResponse:
      type: object
      additionalProperties: false
      required: [factorId, secret]
      properties:
        factorId:
          type: string
          format: uuid
        secret:
          type: string

    MfaVerifyRequest:
      type: object
      additionalProperties: false
      required: [factorId, code]
      properties:
        factorId:
          type: string
          format: uuid
        code:
          type: string
          pattern: '^\\d{6}$'

    PasswordChangeRequest:
      type: object
      additionalProperties: false
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 8
          maxLength: 128
        newPassword:
          type: string
          minLength: 12
          maxLength: 128

    AuthorizationCheckRequest:
      type: object
      additionalProperties: false
      required: [action, resource]
      properties:
        subject:
          type: string
        action:
          type: string
        resource:
          type: string

    AuthorizationCheckResponse:
      type: object
      additionalProperties: false
      required: [allowed, permissionKey]
      properties:
        allowed:
          type: boolean
        permissionKey:
          type: string
        source:
          type: [string, 'null']

    EntitlementCheckRequest:
      type: object
      additionalProperties: false
      required: [key]
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 128
        organizationId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    EntitlementCheckResponse:
      type: object
      additionalProperties: true
      required: [allowed]
      properties:
        allowed:
          type: boolean
        reason:
          type: string
        scope:
          type: string
        value:
          type: [object, boolean]

    SocialLoginUpdateRequest:
      type: object
      additionalProperties: false
      required: [providerEnabled, clientId, clientSecret]
      properties:
        providerEnabled:
          type: boolean
        clientId:
          type: string
          maxLength: 255
        clientSecret:
          type: string
          maxLength: 255

    NotificationUpdateRequest:
      type: object
      additionalProperties: false
      required: [notificationRecipients, alertLevels]
      properties:
        notificationRecipients:
          type: array
          items:
            type: string
            format: email
          maxItems: 50
        alertLevels:
          type: array
          items:
            type: string
            enum: [Critical, Warning]
          minItems: 1
          maxItems: 2

    EmailTemplateUpdateRequest:
      type: object
      additionalProperties: false
      required: [templateKey, subject, body]
      properties:
        templateKey:
          type: string
          minLength: 1
          maxLength: 128
        subject:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          minLength: 1
          maxLength: 20000

    Session:
      type: object
      additionalProperties: false
      required: [id, ipAddress, userAgent, lastSeenAt, createdAt, expiresAt, revokedAt]
      properties:
        id:
          type: string
          format: uuid
        ipAddress:
          type: [string, 'null']
        userAgent:
          type: [string, 'null']
        lastSeenAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        revokedAt:
          type: [string, 'null']
          format: date-time

    SessionListResponse:
      type: object
      additionalProperties: false
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'

    RevokeSessionRequest:
      type: object
      additionalProperties: false
      required: [sessionId]
      properties:
        sessionId:
          type: string
          format: uuid

    RevokeSessionResponse:
      type: object
      additionalProperties: false
      required: [status, sessionId]
      properties:
        status:
          type: string
          enum: [revoked]
        sessionId:
          type: string
          format: uuid

    RevokeAllSessionsResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [revoked_all]

    WebAuthnRegistrationResponse:
      type: object
      additionalProperties: false
      required: [success]
      properties:
        success:
          type: boolean
          enum: [true]
        recoveryCodes:
          type: array
          items:
            type: string

    GoogleLinkRequest:
      type: object
      additionalProperties: false
      required: [idToken, currentPassword]
      properties:
        idToken:
          type: string
          minLength: 1
        currentPassword:
          type: string
          minLength: 8
          maxLength: 128

    GoogleUnlinkRequest:
      type: object
      additionalProperties: false
      required: [providerSubject, currentPassword]
      properties:
        providerSubject:
          type: string
          minLength: 1
          maxLength: 255
        currentPassword:
          type: string
          minLength: 8
          maxLength: 128

    LinkedResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [linked]

    UnlinkedResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [unlinked]

    DiscoveryResponse:
      type: object
      additionalProperties: false
      required:
        - issuer
        - authorization_endpoint
        - token_endpoint
        - revocation_endpoint
        - introspection_endpoint
        - jwks_uri
      properties:
        issuer:
          type: string
          format: uri
        authorization_endpoint:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
        revocation_endpoint:
          type: string
          format: uri
        introspection_endpoint:
          type: string
          format: uri
        jwks_uri:
          type: string
          format: uri

    JwksResponse:
      type: object
      additionalProperties: false
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            additionalProperties: true

    OAuthRevocationRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          minLength: 16
          maxLength: 1024

    OAuthRevocationResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted]

    OAuthIntrospectionRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          minLength: 16
          maxLength: 1024

    OAuthIntrospectionInactiveResponse:
      type: object
      additionalProperties: false
      required: [active]
      properties:
        active:
          type: boolean
          enum: [false]

    OAuthIntrospectionActiveResponse:
      type: object
      additionalProperties: false
      required: [active, sub, sid, exp]
      properties:
        active:
          type: boolean
          enum: [true]
        sub:
          type: string
          format: uuid
        sid:
          type: string
          format: uuid
        exp:
          type: integer
          minimum: 0

paths:
  /healthz:
    get:
      tags: [health]
      operationId: getHealthz
      summary: Liveness check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid probe request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /readyz:
    get:
      tags: [health]
      operationId: getReadyz
      summary: Readiness check
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Dependency unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid probe request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/signup:
    post:
      tags: [auth-public]
      operationId: postV1Signup
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '200':
          description: Signup accepted
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SignupResponseProduction'
                  - $ref: '#/components/schemas/SignupResponseNonProduction'
        '400':
          description: Validation or business error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/login:
    post:
      tags: [auth-public]
      operationId: postV1Login
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginResponse'
                  - $ref: '#/components/schemas/MfaRequiredResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/login/google:
    post:
      tags: [auth-public]
      operationId: postV1LoginGoogle
      summary: Login or sign up with Google ID Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginResponse'
                  - $ref: '#/components/schemas/MfaRequiredResponse'
        '400':
          description: Invalid Google ID Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: MFA required or invalid MFA code for linked local accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Google login disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /oauth/token:
    post:
      tags: [oauth]
      operationId: postOAuthToken
      summary: OAuth token refresh endpoint
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: OAuth token response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenResponse'
        '401':
          description: Invalid client or refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/token/refresh:
    post:
      tags: [auth-public]
      operationId: postV1TokenRefresh
      summary: Refresh tokens (internal API style)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Rotated token bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/email/verify/request:
    post:
      tags: [auth-public]
      operationId: postV1EmailVerifyRequest
      summary: Request verification token for primary email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerifyRequest'
      responses:
        '200':
          description: Verification requested
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EmailVerifyRequestResponseProduction'
                  - $ref: '#/components/schemas/EmailVerifyRequestResponseNonProduction'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/email/verify/confirm:
    post:
      tags: [auth-public]
      operationId: postV1EmailVerifyConfirm
      summary: Confirm email verification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerifyConfirmRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifiedResponse'
        '400':
          description: Invalid verification token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/password/reset/request:
    post:
      tags: [auth-public]
      operationId: postV1PasswordResetRequest
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Reset requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/password/reset/confirm:
    post:
      tags: [auth-public]
      operationId: postV1PasswordResetConfirm
      summary: Confirm password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: Reset confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetResponse'
        '400':
          description: Invalid reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/me:
    get:
      tags: [auth-protected]
      operationId: getV1Me
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [auth-protected]
      operationId: patchV1Me
      summary: Partially update current authenticated user's profile
      security:
