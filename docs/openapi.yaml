        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword:
                  type: string
                  minLength: 8
                  maxLength: 128
                mfaCode:
                  type: string
                  pattern: '^\\d{6}$'
                mfaFactorId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Recovery codes regenerated
          content:
            application/json:
              schema:
                type: object
                required: [recoveryCodes]
                properties:
                  recoveryCodes:
                    type: array
                    items:
                      type: string
