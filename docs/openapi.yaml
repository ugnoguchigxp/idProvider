openapi: 3.1.0
info:
  title: gxp-idProvider API
  version: 0.3.0
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://idp.gxp.internal
security: []

tags:
  - name: health
    description: Health and readiness probes.
  - name: auth-public
    description: Public authentication endpoints.
  - name: auth-protected
    description: Bearer-token protected user endpoints.
  - name: oauth
    description: OAuth 2.0 token lifecycle endpoints.
  - name: oidc
    description: OpenID Connect discovery and key endpoints.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
    basicAuth:
      type: http
      scheme: basic

  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          description: Error code. Common values include invalid_client, invalid_token, mfa_required, rate_limited, unauthorized.
        message:
          type: string
        traceId:
          type: string
      example:
        code: invalid_client
        message: OAuth client authentication required

    EmptyObject:
      type: object
      additionalProperties: true

    HealthResponse:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    ReadyResponse:
      type: object
      additionalProperties: false
      required: [ready]
      properties:
        ready:
          type: boolean
          enum: [true]

    SignupRequest:
      type: object
      additionalProperties: false
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
          maxLength: 128
        displayName:
          type: string
          minLength: 1
          maxLength: 80
        challengeToken:
          type: string
          minLength: 1
          maxLength: 2048
          description: Bot challenge token. Required when bot mitigation policy enforces challenge.

    SignupResponseProduction:
      type: object
      additionalProperties: false
      required: [status, user, verification]
      properties:
        status:
          type: string
          enum: [accepted]
        user:
          type: object
          additionalProperties: false
          required: [userId, email]
          properties:
            userId:
              type: string
              format: uuid
            email:
              type: string
              format: email
        verification:
          type: object
          additionalProperties: false
          required: [required]
          properties:
            required:
              type: boolean
              enum: [true]

    SignupResponseNonProduction:
      type: object
      additionalProperties: false
      required: [status, user, verification]
      properties:
        status:
          type: string
          enum: [accepted]
        user:
          type: object
          additionalProperties: false
          required: [userId, email]
          properties:
            userId:
              type: string
              format: uuid
            email:
              type: string
              format: email
        verification:
          type: object
          additionalProperties: false
          required: [required, token]
          properties:
            required:
              type: boolean
              enum: [true]
            token:
              type: string

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
          maxLength: 128
        mfaCode:
          type: string
          pattern: '^\d{6}$'
        mfaFactorId:
          type: string
          format: uuid
        mfaRecoveryCode:
          type: string
          minLength: 20
          maxLength: 32
        challengeToken:
          type: string
          minLength: 1
          maxLength: 2048
          description: Bot challenge token. Required when risk policy requires challenge.

    GoogleLoginRequest:
      type: object
      additionalProperties: false
      required: [idToken]
      properties:
        idToken:
          type: string
          minLength: 1
        mfaCode:
          type: string
          pattern: '^\d{6}$'
        mfaFactorId:
          type: string
          format: uuid
        mfaRecoveryCode:
          type: string
          minLength: 20
          maxLength: 32
        challengeToken:
          type: string
          minLength: 1
          maxLength: 2048
          description: Bot challenge token. Required when risk policy requires challenge.

    LoginResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - userId
        - mfaEnabled
        - accessToken
        - refreshToken
        - accessExpiresAt
        - refreshExpiresAt
      properties:
        status:
          type: string
          enum: [ok]
        userId:
          type: string
          format: uuid
        mfaEnabled:
          type: boolean
        mfaWarning:
          type: [string, 'null']
        accessToken:
          type: string
        refreshToken:
          type: string
        accessExpiresAt:
          type: string
          format: date-time
        refreshExpiresAt:
          type: string
          format: date-time

    MfaRequiredResponse:
      type: object
      additionalProperties: false
      required: [mfaRequired, userId]
      properties:
        mfaRequired:
          type: boolean
          enum: [true]
        userId:
          type: string
          format: uuid

    RefreshRequest:
      type: object
      additionalProperties: false
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 16
          maxLength: 1024

    TokenRefreshResponse:
      type: object
      additionalProperties: false
      required: [userId, accessToken, refreshToken, accessExpiresAt, refreshExpiresAt]
      properties:
        userId:
          type: string
          format: uuid
        accessToken:
          type: string
        refreshToken:
          type: string
        accessExpiresAt:
          type: string
          format: date-time
        refreshExpiresAt:
          type: string
          format: date-time

    OAuthTokenResponse:
      type: object
      additionalProperties: false
      required: [token_type, access_token, refresh_token, expires_in]
      properties:
        token_type:
          type: string
          enum: [Bearer]
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          minimum: 1

    EmailVerifyRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email

    EmailVerifyRequestResponseProduction:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted]

    EmailVerifyRequestResponseNonProduction:
      type: object
      additionalProperties: false
      required: [status, token]
      properties:
        status:
          type: string
          enum: [accepted]
        token:
          type: [string, 'null']

    EmailVerifyConfirmRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          minLength: 16
          maxLength: 1024

    StatusOkResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    LoggedOutResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [logged_out]

    VerifiedResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [verified]

    ResetResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [reset]

    ChangedResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [changed]

    PasswordResetRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
        challengeToken:
          type: string
          minLength: 1
          maxLength: 2048
          description: Bot challenge token. Required when bot mitigation policy enforces challenge.

    PasswordResetRequestResponse:
      type: object
      additionalProperties: false
      required: [status, accepted]
      properties:
        status:
          type: string
          enum: [accepted]
        accepted:
          type: boolean
          enum: [true]
        token:
          type: string

    PasswordResetConfirmRequest:
      type: object
      additionalProperties: false
      required: [resetToken, newPassword]
      properties:
        resetToken:
          type: string
          minLength: 16
          maxLength: 1024
        newPassword:
          type: string
          minLength: 12
          maxLength: 128

    MeResponse:
      type: object
      additionalProperties: false
      required: [userId, email, status, emailVerified, profile]
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        status:
          type: string
        emailVerified:
          type: boolean
        profile:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      additionalProperties: false
      required: [displayName, givenName, familyName, preferredUsername, locale, zoneinfo]
      properties:
        displayName:
          type: [string, 'null']
          maxLength: 80
        givenName:
          type: [string, 'null']
          maxLength: 80
        familyName:
          type: [string, 'null']
          maxLength: 80
        preferredUsername:
          type: [string, 'null']
          pattern: '^(?!.*[._-]{2})(?!.*[._-]$)[a-z0-9][a-z0-9._-]{2,63}$'
        locale:
          type: [string, 'null']
          maxLength: 35
        zoneinfo:
          type: [string, 'null']
          maxLength: 64

    UpdateMeRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 80
        givenName:
          type: string
          minLength: 1
          maxLength: 80
        familyName:
          type: string
          minLength: 1
          maxLength: 80
        preferredUsername:
          type: string
          pattern: '^(?!.*[._-]{2})(?!.*[._-]$)[a-z0-9][a-z0-9._-]{2,63}$'
        locale:
          type: string
          minLength: 1
          maxLength: 35
        zoneinfo:
          type: string
          minLength: 1
          maxLength: 64

    MfaEnrollResponse:
      type: object
      additionalProperties: false
      required: [factorId, secret]
      properties:
        factorId:
          type: string
          format: uuid
        secret:
          type: string

    MfaVerifyRequest:
      type: object
      additionalProperties: false
      required: [factorId, code]
      properties:
        factorId:
          type: string
          format: uuid
        code:
          type: string
          pattern: '^\\d{6}$'

    PasswordChangeRequest:
      type: object
      additionalProperties: false
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 8
          maxLength: 128
        newPassword:
          type: string
          minLength: 12
          maxLength: 128

    AuthorizationCheckRequest:
      type: object
      additionalProperties: false
      required: [action, resource]
      properties:
        subject:
          type: string
        action:
          type: string
        resource:
          type: string

    AuthorizationCheckResponse:
      type: object
      additionalProperties: false
      required: [allowed, permissionKey]
      properties:
        allowed:
          type: boolean
        permissionKey:
          type: string
        source:
          type: [string, 'null']

    EntitlementCheckRequest:
      type: object
      additionalProperties: false
      required: [key]
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 128
        organizationId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    EntitlementCheckResponse:
      type: object
      additionalProperties: true
      required: [allowed]
      properties:
        allowed:
          type: boolean
        reason:
          type: string
        scope:
          type: string
        value:
          type: [object, boolean]

    SocialLoginUpdateRequest:
      type: object
      additionalProperties: false
      required: [providerEnabled, clientId, clientSecret]
      properties:
        providerEnabled:
          type: boolean
        clientId:
          type: string
          maxLength: 255
        clientSecret:
          type: string
          maxLength: 255

    NotificationUpdateRequest:
      type: object
      additionalProperties: false
      required: [notificationRecipients, alertLevels]
      properties:
        notificationRecipients:
          type: array
          items:
            type: string
            format: email
          maxItems: 50
        alertLevels:
          type: array
          items:
            type: string
            enum: [Critical, Warning]
          minItems: 1
          maxItems: 2

    EmailTemplateUpdateRequest:
      type: object
      additionalProperties: false
      required: [templateKey, subject, body]
      properties:
        templateKey:
          type: string
          minLength: 1
          maxLength: 128
        subject:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          minLength: 1
          maxLength: 20000

    OAuthClient:
      type: object
      additionalProperties: false
      required:
        - clientId
        - name
        - clientType
        - tokenEndpointAuthMethod
        - status
        - redirectUris
        - allowedScopes
      properties:
        clientId:
          type: string
        name:
          type: string
        clientType:
          type: string
          enum: [confidential, public]
        tokenEndpointAuthMethod:
          type: string
          enum: [client_secret_basic]
        status:
          type: string
          enum: [active, disabled]
        accessTokenTtlSeconds:
          type: [integer, 'null']
          minimum: 1
        refreshTokenTtlSeconds:
          type: [integer, 'null']
          minimum: 1
        redirectUris:
          type: array
          items:
            type: string
            format: uri
        allowedScopes:
          type: array
          items:
            type: string

    OAuthClientListResponse:
      type: object
      additionalProperties: false
      required: [clients]
      properties:
        clients:
          type: array
          items:
            $ref: '#/components/schemas/OAuthClient'

    OAuthClientCreateRequest:
      type: object
      additionalProperties: false
      required: [name, clientType, tokenEndpointAuthMethod, redirectUris, allowedScopes]
      properties:
        clientId:
          type: string
          minLength: 3
          maxLength: 128
        name:
          type: string
          minLength: 1
          maxLength: 160
        clientType:
          type: string
          enum: [confidential, public]
        tokenEndpointAuthMethod:
          type: string
          enum: [client_secret_basic]
        redirectUris:
          type: array
          maxItems: 50
          items:
            type: string
            format: uri
        allowedScopes:
          type: array
          maxItems: 100
          items:
            type: string
            minLength: 1
            maxLength: 128
        accessTokenTtlSeconds:
          type: integer
          minimum: 1
        refreshTokenTtlSeconds:
          type: integer
          minimum: 1

    OAuthClientCreateResponse:
      type: object
      additionalProperties: false
      required: [status, clientId, clientSecret, secretHint]
      properties:
        status:
          type: string
          enum: [created]
        clientId:
          type: string
        clientSecret:
          type: string
        secretHint:
          type: string

    OAuthClientUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 160
        status:
          type: string
          enum: [active, disabled]
        redirectUris:
          type: array
          maxItems: 50
          items:
            type: string
            format: uri
        allowedScopes:
          type: array
          maxItems: 100
          items:
            type: string
            minLength: 1
            maxLength: 128
        accessTokenTtlSeconds:
          type: [integer, 'null']
          minimum: 1
        refreshTokenTtlSeconds:
          type: [integer, 'null']
          minimum: 1

    OAuthClientStatusResponse:
      type: object
      additionalProperties: false
      required: [status, clientId]
      properties:
        status:
          type: string
          enum: [updated]
        clientId:
          type: string

    OAuthClientRotateSecretRequest:
      type: object
      additionalProperties: false
      required: [gracePeriodDays]
      properties:
        gracePeriodDays:
          type: integer
          minimum: 0
          maximum: 90

    OAuthClientRotateSecretResponse:
      type: object
      additionalProperties: false
      required: [status, clientId, clientSecret, secretHint, graceUntil]
      properties:
        status:
          type: string
          enum: [rotated]
        clientId:
          type: string
        clientSecret:
          type: string
        secretHint:
          type: string
        graceUntil:
          type: [string, 'null']
          format: date-time

    KeyRecord:
      type: object
      additionalProperties: false
      required:
        - kid
        - alg
        - state
        - createdAt
        - expiresAt
        - revokedAt
        - rotationReason
        - rotatedFromKid
      properties:
        kid:
          type: string
        alg:
          type: string
        state:
          type: string
          enum: [active, grace, revoked]
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: [string, 'null']
          format: date-time
        revokedAt:
          type: [string, 'null']
          format: date-time
        rotationReason:
          type: [string, 'null']
        rotatedFromKid:
          type: [string, 'null']

    KeyListResponse:
      type: object
      additionalProperties: false
      required: [keys]
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/KeyRecord'

    KeyRotateResponse:
      type: object
      additionalProperties: false
      required: [status, activeKid, previousKid, reason]
      properties:
        status:
          type: string
          enum: [rotated, noop]
        activeKid:
          type: string
        previousKid:
          type: [string, 'null']
        reason:
          type: string
          enum: [scheduled, manual, emergency]

    AuditLogRecord:
      type: object
      additionalProperties: false
      required:
        - id
        - actorUserId
        - action
        - resourceType
        - resourceId
        - payload
        - prevHash
        - entryHash
        - integrityVersion
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        actorUserId:
          type: [string, 'null']
          format: uuid
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: [string, 'null']
        payload:
          type: object
          additionalProperties: true
        prevHash:
          type: [string, 'null']
        entryHash:
          type: [string, 'null']
        integrityVersion:
          type: integer
        createdAt:
          type: string
          format: date-time

    AuditLogListResponse:
      type: object
      additionalProperties: false
      required: [logs, nextCursor]
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogRecord'
        nextCursor:
          type: [string, 'null']

    SecurityEventRecord:
      type: object
      additionalProperties: false
      required: [id, userId, eventType, payload, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: [string, 'null']
          format: uuid
        eventType:
          type: string
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    SecurityEventListResponse:
      type: object
      additionalProperties: false
      required: [events, nextCursor]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/SecurityEventRecord'
        nextCursor:
          type: [string, 'null']

    AuditIntegrityResponse:
      type: object
      additionalProperties: false
      required: [ok, checked, firstId, lastId, brokenAt, reason]
      properties:
        ok:
          type: boolean
        checked:
          type: integer
        firstId:
          type: [string, 'null']
          format: uuid
        lastId:
          type: [string, 'null']
          format: uuid
        brokenAt:
          type: [string, 'null']
          format: uuid
        reason:
          type: [string, 'null']

    AuditExportRequest:
      type: object
      additionalProperties: false
      required: [kind, format]
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        kind:
          type: string
          enum: [audit_logs, security_events, both]
        format:
          type: string
          enum: [jsonl]

    AuditExportManifest:
      type: object
      additionalProperties: false
      required: [recordCount, sha256, generatedAt]
      properties:
        recordCount:
          type: integer
        sha256:
          type: string
        generatedAt:
          type: string
          format: date-time

    AuditExportResponse:
      type: object
      additionalProperties: false
      required: [exportId, status, manifest, format, data, truncated]
      properties:
        exportId:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed]
        manifest:
          $ref: '#/components/schemas/AuditExportManifest'
        format:
          type: string
          enum: [jsonl]
        data:
          type: string
        truncated:
          type: boolean

    Session:
      type: object
      additionalProperties: false
      required: [id, ipAddress, userAgent, lastSeenAt, createdAt, expiresAt, revokedAt]
      properties:
        id:
          type: string
          format: uuid
        ipAddress:
          type: [string, 'null']
        userAgent:
          type: [string, 'null']
        lastSeenAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        revokedAt:
          type: [string, 'null']
          format: date-time

    SessionListResponse:
      type: object
      additionalProperties: false
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'

    RevokeSessionRequest:
      type: object
      additionalProperties: false
      required: [sessionId]
      properties:
        sessionId:
          type: string
          format: uuid

    RevokeSessionResponse:
      type: object
      additionalProperties: false
      required: [status, sessionId]
      properties:
        status:
          type: string
          enum: [revoked]
        sessionId:
          type: string
          format: uuid

    RevokeAllSessionsResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [revoked_all]

    WebAuthnRegistrationResponse:
      type: object
      additionalProperties: false
      required: [success]
      properties:
        success:
          type: boolean
          enum: [true]
        recoveryCodes:
          type: array
          items:
            type: string

    GoogleLinkRequest:
      type: object
      additionalProperties: false
      required: [idToken, currentPassword]
      properties:
        idToken:
          type: string
          minLength: 1
        currentPassword:
          type: string
          minLength: 8
          maxLength: 128

    GoogleUnlinkRequest:
      type: object
      additionalProperties: false
      required: [providerSubject, currentPassword]
      properties:
        providerSubject:
          type: string
          minLength: 1
          maxLength: 255
        currentPassword:
          type: string
          minLength: 8
          maxLength: 128

    LinkedResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [linked]

    UnlinkedResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [unlinked]

    DiscoveryResponse:
      type: object
      additionalProperties: false
      required:
        - issuer
        - authorization_endpoint
        - token_endpoint
        - revocation_endpoint
        - introspection_endpoint
        - jwks_uri
      properties:
        issuer:
          type: string
          format: uri
        authorization_endpoint:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
        revocation_endpoint:
          type: string
          format: uri
        introspection_endpoint:
          type: string
          format: uri
        jwks_uri:
          type: string
          format: uri

    JwksResponse:
      type: object
      additionalProperties: false
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            additionalProperties: true

    OAuthRevocationRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          minLength: 16
          maxLength: 1024

    OAuthRevocationResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted]

    OAuthIntrospectionRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          minLength: 16
          maxLength: 1024

    OAuthIntrospectionInactiveResponse:
      type: object
      additionalProperties: false
      required: [active]
      properties:
        active:
          type: boolean
          enum: [false]

    OAuthIntrospectionActiveResponse:
      type: object
      additionalProperties: false
      required: [active, sub, sid, exp]
      properties:
        active:
          type: boolean
          enum: [true]
        sub:
          type: string
          format: uuid
        sid:
          type: string
          format: uuid
        exp:
          type: integer
          minimum: 0

