      summary: Revoke by access/refresh token
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthRevocationRequest'
      responses:
        '200':
          description: Revocation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthRevocationResponse'
        '401':
          description: Invalid client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidClient:
                  value:
                    code: invalid_client
                    message: OAuth client authentication required
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                rateLimited:
                  value:
                    code: rate_limited
                    message: Too many OAuth revocation requests

